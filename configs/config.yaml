app:
  name: "Image Restoration AI"
  version: "1.0.0"
  debug: false
  host: "0.0.0.0"
  port: 8000

pipeline:
  device: "cuda"  # cuda, cpu, mps
  precision: "fp16" # fp32, fp16, bf16
  compile_models: false
  enable_tensorrt: false
  batch_size: 1
  max_workers: 4

router:
  haze_threshold: 0.22
  lowlight_threshold: 0.80
  rain_threshold: 0.22
  execution_order: ["lowlight", "rain", "haze"]

logging:
  level: "INFO"
  format: "json"
  file: "logs/restoration.log"
